<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>UltronVision - Cameras</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#01207B",
                        "primary-light": "#334EAC",
                        "background-light": "#ffffff",
                        "background-dark": "#01207B",
                        "text-main": "#01207B",
                        "text-muted": "#6b7280",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "body": ["Noto Sans", "sans-serif"]
                    },
                },
            },
        }
    </script>
    <style>
        body { font-family: "Noto Sans", sans-serif; }
        h1, h2, h3, h4, h5, h6 { font-family: "Space Grotesk", sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
        .live-stream { aspect-ratio: 16/9; background-color: #000; overflow: hidden; position: relative; border-radius: 0.5rem; }
        .live-stream img { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark text-text-main dark:text-gray-100 flex flex-col min-h-screen overflow-x-hidden">
    <header class="flex items-center justify-between border-b border-gray-100 dark:border-white/30 bg-white dark:bg-[#0f1e23] px-8 py-5 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <img src="/static/images/AdaptLogo.jpg" alt="UltronVision Logo" class="h-8 w-auto">
            <h2 class="text-primary dark:text-white text-lg font-bold tracking-tight">UltronVision</h2>
        </div>
        <div class="flex items-center gap-6">
            <div class="flex items-center gap-2 px-3 py-1 rounded-full bg-red-50/50 dark:bg-red-900/20">
                <div class="size-1.5 rounded-full bg-red-500 animate-pulse"></div>
                <span class="text-[10px] font-semibold text-red-600 dark:text-red-400 uppercase tracking-widest">LIVE RECORDING</span>
            </div>
            <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-white/10 transition-colors text-primary dark:text-white">
                <span class="material-symbols-outlined theme-icon-light hidden">light_mode</span>
                <span class="material-symbols-outlined theme-icon-dark">dark_mode</span>
            </button>
        </div>
    </header>

    <main class="flex-1 flex flex-col w-full max-w-[1400px] mx-auto px-6 py-8 gap-6 pb-32">
        <section class="flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
            <div>
                <h1 class="text-3xl font-light text-text-main dark:text-white tracking-tight mb-1">Live Cameras</h1>
                <p class="text-sm text-text-muted dark:text-white/60">Manage tracking streams and monitoring agents.</p>
            </div>
            <button onclick="openModal()" class="flex items-center gap-2 bg-primary dark:bg-white text-white dark:text-primary px-4 py-2 rounded-lg font-medium hover:bg-primary-light dark:hover:bg-gray-200 transition-colors">
                <span class="material-symbols-outlined text-sm">add</span> Add Camera
            </button>
        </section>

        <!-- Dynamic Grid of Cameras -->
        <section>
            <div id="camera-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="col-span-full py-12 text-center text-text-muted animate-pulse">Loading cameras...</div>
            </div>
        </section>
    </main>

    <!-- Navigation -->
    <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 z-50 bg-[#01207B] p-1.5 rounded-2xl shadow-xl shadow-indigo-500/20 flex items-center gap-1 border border-white/10">
        <a href="/" class="flex items-center gap-2 px-5 py-2.5 rounded-xl transition-all duration-200 text-white/70 hover:text-white hover:bg-white/5">
            <span class="material-symbols-outlined text-[20px]">dashboard</span><span class="text-sm">Dash</span>
        </a>
        <div class="w-px h-6 bg-white/10 mx-1"></div>
        <a href="/upload" class="flex items-center gap-2 px-5 py-2.5 rounded-xl transition-all duration-200 text-white/70 hover:text-white hover:bg-white/5">
            <span class="material-symbols-outlined text-[20px]">search</span><span class="text-sm">Retrieval</span>
        </a>
        <div class="w-px h-6 bg-white/10 mx-1"></div>
        <a href="/cameras" class="flex items-center gap-2 px-5 py-2.5 rounded-xl transition-all duration-200 bg-white/10 text-white font-medium shadow-sm">
            <span class="material-symbols-outlined text-[20px]">videocam</span><span class="text-sm">Cameras</span>
        </a>
    </nav>

    <!-- Add Camera Modal -->
    <div id="add-camera-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center">
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="closeModal()"></div>
        
        <!-- Modal Content -->
        <div class="relative bg-white dark:bg-zinc-900 rounded-xl shadow-2xl w-full max-w-md mx-4 overflow-hidden border border-gray-100 dark:border-gray-800">
            <div class="px-6 py-4 border-b border-gray-100 dark:border-gray-800 flex justify-between items-center bg-gray-50/50 dark:bg-black/20">
                <h3 class="font-bold text-lg dark:text-white">Add New Camera</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 dark:hover:text-white"><span class="material-symbols-outlined">close</span></button>
            </div>
            
            <div class="p-6">
                <form id="camera-form" class="flex flex-col gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Label / Name</label>
                        <input type="text" id="cam-label" placeholder="e.g. Front Door" class="w-full rounded-lg border-gray-300 dark:border-gray-700 dark:bg-zinc-800 dark:text-white text-sm" required>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Type</label>
                        <select id="cam-type" class="w-full rounded-lg border-gray-300 dark:border-gray-700 dark:bg-zinc-800 dark:text-white text-sm" onchange="toggleSourceField()">
                            <option value="wired">Wired / Local (USB Webcam)</option>
                            <option value="ip">IP Camera (HTTP Video Stream)</option>
                        </select>
                    </div>
                    
                    <div id="source-wired-wrap">
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Device Index</label>
                        <input type="number" id="cam-index" min="0" value="0" class="w-full rounded-lg border-gray-300 dark:border-gray-700 dark:bg-zinc-800 dark:text-white text-sm">
                        <p class="text-xs text-text-muted mt-1">Usually 0 for the built-in webcam, 1 for external.</p>
                    </div>
                    
                    <div id="source-ip-wrap" class="hidden">
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Stream URL</label>
                        <input type="url" id="cam-url" placeholder="http://192.168.1.100:8080/video" class="w-full rounded-lg border-gray-300 dark:border-gray-700 dark:bg-zinc-800 dark:text-white text-sm">
                    </div>
                    
                    <div class="mt-4 flex justify-end gap-3">
                        <button type="button" onclick="closeModal()" class="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100 dark:text-gray-300 dark:hover:bg-zinc-800">Cancel</button>
                        <button type="submit" class="px-4 py-2 rounded-lg text-sm font-medium bg-primary text-white hover:bg-primary-light">Add Camera</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api/cameras';
        
        async function fetchCameras() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                renderCameras(data.cameras);
            } catch (err) {
                document.getElementById('camera-grid').innerHTML = `<p class="col-span-full text-red-500">Failed to load cameras: ${err.message}</p>`;
            }
        }
        
        function renderCameras(cameras) {
            const grid = document.getElementById('camera-grid');
            if (cameras.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full text-center py-16 border-2 border-dashed border-gray-200 dark:border-gray-800 rounded-xl">
                        <span class="material-symbols-outlined text-4xl text-gray-400 mb-2">videocam_off</span>
                        <h3 class="text-lg font-medium text-gray-700 dark:text-gray-300">No Cameras Configured</h3>
                        <p class="text-gray-500 dark:text-gray-500 mt-1">Click "Add Camera" to get started.</p>
                    </div>`;
                return;
            }
            
            grid.innerHTML = cameras.map(cam => `
                <div class="bg-surface-white dark:bg-zinc-900 rounded-xl overflow-hidden border border-gray-100/50 dark:border-gray-800 shadow-sm flex flex-col">
                    <div class="p-3 border-b border-gray-50 dark:border-gray-800 flex justify-between items-center bg-gray-50/30 dark:bg-black/10">
                        <div class="flex items-center gap-2 font-bold text-sm text-text-main dark:text-white">
                            <span class="material-symbols-outlined text-[18px] text-primary dark:text-blue-400">${cam.type === 'ip' ? 'wifi_tethering' : 'usb'}</span>
                            ${cam.label}
                        </div>
                        <div class="flex gap-1.5 items-center">
                            <button onclick="toggleCamera('${cam.id}')" class="text-text-muted hover:text-primary transition-colors p-1" title="${cam.enabled ? 'Disable' : 'Enable'}">
                                <span class="material-symbols-outlined text-[18px]">${cam.enabled ? 'power' : 'power_off'}</span>
                            </button>
                            <button onclick="deleteCamera('${cam.id}')" class="text-text-muted hover:text-red-500 transition-colors p-1" title="Remove">
                                <span class="material-symbols-outlined text-[18px]">delete</span>
                            </button>
                        </div>
                    </div>
                    <div class="live-stream bg-black relative">
                        ${cam.enabled 
                            ? `<img src="/api/cameras/${cam.id}/stream" alt="${cam.label} Stream" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\\'absolute inset-0 flex flex-col items-center justify-center text-gray-500\\'><span class=\\'material-symbols-outlined text-3xl mb-1\\'>portable_wifi_off</span><span class=\\'text-xs\\'>Stream Offline</span></div>';">` 
                            : `<div class="absolute inset-0 flex flex-col items-center justify-center text-gray-500"><span class="material-symbols-outlined text-3xl mb-1">videocam_off</span><span class="text-xs">Camera Disabled</span></div>`
                        }
                    </div>
                    <div class="p-3 bg-gray-50 dark:bg-black/20 text-xs font-mono text-text-muted flex justify-between border-t border-gray-100 dark:border-gray-800">
                        <span>ID: ${cam.id}</span>
                        <span>Src: ${cam.source}</span>
                    </div>
                </div>
            `).join('');
        }
        
        async function deleteCamera(id) {
            if(!confirm("Remove this camera?")) return;
            await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            fetchCameras();
        }

        async function toggleCamera(id) {
            await fetch(`${API_URL}/${id}/toggle`, { method: 'PUT' });
            fetchCameras();
        }
        
        // Modal Logic
        const modal = document.getElementById('add-camera-modal');
        function openModal() { modal.classList.remove('hidden'); }
        function closeModal() { modal.classList.add('hidden'); }
        
        function toggleSourceField() {
            const type = document.getElementById('cam-type').value;
            if (type === 'wired') {
                document.getElementById('source-wired-wrap').classList.remove('hidden');
                document.getElementById('source-ip-wrap').classList.add('hidden');
                document.getElementById('cam-url').required = false;
                document.getElementById('cam-index').required = true;
            } else {
                document.getElementById('source-wired-wrap').classList.add('hidden');
                document.getElementById('source-ip-wrap').classList.remove('hidden');
                document.getElementById('cam-url').required = true;
                document.getElementById('cam-index').required = false;
            }
        }
        
        document.getElementById('camera-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const type = document.getElementById('cam-type').value;
            const label = document.getElementById('cam-label').value;
            const source = type === 'wired' ? document.getElementById('cam-index').value : document.getElementById('cam-url').value;
            
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ type, source, label })
                });
                if (res.ok) {
                    closeModal();
                    e.target.reset();
                    toggleSourceField();
                    fetchCameras();
                } else {
                    const data = await res.json();
                    alert("Error: " + data.error);
                }
            } catch (err) { alert("Failed to add camera: " + err.message); }
        });
        
        // Bootstrap
        fetchCameras();
        
        // Dark mode
        const themeToggleBtn = document.getElementById('theme-toggle');
        const htmlRoot = document.documentElement;
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            htmlRoot.classList.add('dark');
        } else {
            htmlRoot.classList.remove('dark');
        }
        function updateThemeUI() {
            if (htmlRoot.classList.contains('dark')) {
                document.querySelector('.theme-icon-light').classList.remove('hidden');
                document.querySelector('.theme-icon-dark').classList.add('hidden');
            } else {
                document.querySelector('.theme-icon-light').classList.add('hidden');
                document.querySelector('.theme-icon-dark').classList.remove('hidden');
            }
        }
        updateThemeUI();
        themeToggleBtn.addEventListener('click', () => {
            htmlRoot.classList.toggle('dark');
            localStorage.theme = htmlRoot.classList.contains('dark') ? 'dark' : 'light';
            updateThemeUI();
        });
    </script>
</body>
</html>
